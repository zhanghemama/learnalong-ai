<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LearnAlong AI 学习页</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f5ef;
        --ink: #202124;
        --muted: #6c6f75;
        --green: #1f7a61;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--ink);
      }
      main {
        width: min(720px, 100%);
        margin: 0 auto;
        padding: 48px 20px;
      }
      h1 {
        margin: 0;
        font-size: 32px;
        letter-spacing: 0;
      }
      p {
        color: var(--muted);
        line-height: 1.6;
      }
      .accent {
        color: var(--green);
        font-weight: 800;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="accent">LearnAlong AI</div>
      <h1>正在打开学习页</h1>
      <p id="status">如果停在这里，请回到插件重新生成一次。</p>
    </main>
    <script src="learning-page.js"></script>
  </body>
</html>
